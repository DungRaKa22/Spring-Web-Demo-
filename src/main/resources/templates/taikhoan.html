<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Tài Khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container-fluid mt-4 px-4">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">HỆ THỐNG QUẢN LÝ</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/chucvu}">Quản lý Chức Vụ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/nhanvien}">Quản lý Nhân Viên</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/taikhoan}">Quản lý Tài Khoản</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<h2 class="text-center mb-4 text-primary">QUẢN LÝ TÀI KHOẢN</h2>

<div class="card p-3 mb-4 shadow-sm">
    <form th:action="@{/taikhoan/save}" th:object="${taiKhoanMoi}" method="post" class="row g-3">
        <div class="col-md-2">
            <label class="form-label fw-bold">ID Tài Khoản</label>
            <input type="text" th:field="*{id}" class="form-control" required>
        </div>

        <div class="col-md-3">
            <label class="form-label fw-bold">Nhân Viên Sở Hữu</label>
            <select th:field="*{manhanvien}" class="form-select">
                <option th:each="nv : ${listNhanVien}"
                        th:value="${nv.manhanvien}"
                        th:text="${nv.tennhanvien} + ' - ' + ${nv.manhanvien}"></option>
            </select>
        </div>

        <div class="col-md-2">
            <label class="form-label fw-bold">Tên Đăng Nhập</label>
            <input type="text" th:field="*{tendangnhap}" class="form-control" required>
        </div>
        <div class="col-md-2">
            <label class="form-label fw-bold">Mật Khẩu</label>
            <input type="password" th:field="*{password}" class="form-control" required>
        </div>

        <div class="col-md-3">
            <label class="form-label fw-bold">Quyền Hạn</label>
            <select th:field="*{quyen}" class="form-select">
                <option th:each="q : ${listQuyen}"
                        th:value="${q.tenquyen}"
                        th:text="${q.tenquyen}"></option>
            </select>
        </div>

        <div class="col-md-10">
            <label class="form-label fw-bold">Ghi Chú</label>
            <input type="text" th:field="*{ghichu}" class="form-control">
        </div>

        <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn btn-success w-100">Cấp Tài Khoản</button>
        </div>
    </form>
</div>

<form th:action="@{/taikhoan}" method="get" class="mb-3 w-50">
    <div class="input-group">
        <input type="text" name="keyword" class="form-control" placeholder="Tìm theo tên đăng nhập...">
        <button type="submit" class="btn btn-secondary">Tìm kiếm</button>
    </div>
</form>

<table class="table table-bordered table-hover shadow-sm">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Mã Nhân Viên</th>
        <th>Tên Đăng Nhập</th>
        <th>Quyền</th>
        <th>Ghi Chú</th>
        <th class="text-center">Thao Tác</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="tk : ${listTaiKhoan}">
        <td th:text="${tk.id}"></td>
        <td th:text="${tk.manhanvien}"></td>
        <td th:text="${tk.tendangnhap}"></td>
        <td th:text="${tk.quyen}"></td>
        <td th:text="${tk.ghichu}"></td>
        <td class="text-center">
            <a th:href="@{/taikhoan/delete/{id}(id=${tk.id})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('Xóa tài khoản này?')">Xóa</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Nhân Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">HỆ THỐNG QUẢN LÝ</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/chucvu}">Quản lý Chức Vụ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/nhanvien}">Quản lý Nhân Viên</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/taikhoan}">Quản lý Tài Khoản</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid px-4">
    <h2 class="text-center mb-4 text-primary">QUẢN LÝ NHÂN VIÊN</h2>

    <div class="card p-3 mb-4 shadow-sm">
        <form th:action="@{/nhanvien/save}" th:object="${nhanVienMoi}" method="post" class="row g-3">
            <div class="col-md-2">
                <label class="form-label fw-bold">Mã NV</label>
                <input type="text" th:field="*{manhanvien}" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Tên Nhân Viên</label>
                <input type="text" th:field="*{tennhanvien}" class="form-control" required>
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold">Ngày Sinh</label>
                <input type="date" th:field="*{ngaysinh}" class="form-control">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold">Giới Tính</label>
                <select th:field="*{gioitinh}" class="form-select">
                    <option value="Nam">Nam</option>
                    <option value="Nữ">Nữ</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Chức Vụ</label>
                <select th:field="*{chucvu}" class="form-select">
                    <option th:each="cv : ${listChucVu}"
                            th:value="${cv.tenchucvu}"
                            th:text="${cv.tenchucvu}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold">Ngày Vào Làm</label>
                <input type="date" th:field="*{ngayvaolam}" class="form-control">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Địa Chỉ</label>
                <input type="text" th:field="*{diachi}" class="form-control">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold">Số Điện Thoại</label>
                <input type="text" th:field="*{sdt}" class="form-control">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Ghi Chú</label>
                <input type="text" th:field="*{ghichu}" class="form-control">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-success w-100">Lưu Dữ Liệu</button>
            </div>
        </form>
    </div>

    <form th:action="@{/nhanvien}" method="get" class="mb-3 w-50">
        <div class="input-group">
            <input type="text" name="keyword" class="form-control" placeholder="Tìm theo mã hoặc tên nhân viên...">
            <button type="submit" class="btn btn-secondary">Tìm kiếm</button>
        </div>
    </form>

    <table class="table table-bordered table-hover shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>Mã NV</th>
            <th>Tên NV</th>
            <th>Ngày Sinh</th>
            <th>Giới Tính</th>
            <th>Ngày Vào Làm</th>
            <th>Chức Vụ</th>
            <th>Địa Chỉ</th>
            <th>SĐT</th>
            <th class="text-center">Thao Tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="nv : ${listNhanVien}">
            <td th:text="${nv.manhanvien}"></td>
            <td th:text="${nv.tennhanvien}"></td>
            <td th:text="${nv.ngaysinh}"></td>
            <td th:text="${nv.gioitinh}"></td>
            <td th:text="${nv.ngayvaolam}"></td>
            <td th:text="${nv.chucvu}"></td>
            <td th:text="${nv.diachi}"></td>
            <td th:text="${nv.sdt}"></td>
            <td class="text-center">
                <a th:href="@{/nhanvien/delete/{id}(id=${nv.manhanvien})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Bạn có chắc chắn muốn xóa nhân viên này?')">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
